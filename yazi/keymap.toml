# Prepend custom keybindings — these take priority over defaults.
# Full default keybindings: https://yazi-rs.github.io/docs/configuration/keymap
# Defaults: https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/keymap-default.toml

[mgr]
prepend_keymap = [
  # Open a shell in the current directory
  { on = "!", run = 'shell "$SHELL" --block', desc = "Open shell here" },

  # Edit hovered file in $EDITOR
  { on = "e", run = 'shell "$EDITOR $0" --block', desc = "Edit in $EDITOR" },

  # Fuzzy find files in current dir using fzf
  { on = "<C-f>", run = "plugin fzf", desc = "Find file via fzf" },
 ]
